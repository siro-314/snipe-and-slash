<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNIPE & SLASH - VR Game</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- controls個別ビルド: Three.js重複警告を回避 -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.controls.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: monospace;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      z-index: 1000;
    }

    #startScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      font-family: 'Arial', sans-serif;
    }

    #startScreen h1 {
      font-size: 64px;
      color: #00d4ff;
      text-shadow: 0 0 20px #00d4ff;
      margin-bottom: 20px;
    }

    #startScreen p {
      font-size: 20px;
      color: #ffffff;
      margin: 10px 0;
    }

    #startButton {
      margin-top: 30px;
      padding: 20px 40px;
      font-size: 24px;
      color: white;
      background: #00d4ff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
      transition: all 0.3s;
    }

    #startButton:hover {
      transform: scale(1.1);
      box-shadow: 0 0 50px rgba(0, 212, 255, 0.8);
    }
  </style>
</head>

<body>
  <!-- スタート画面 -->
  <div id="startScreen">
    <h1>⚔️ SNIPE & SLASH 🏹</h1>
    <p>🎮 VRヘッドセットを装着してください</p>
    <p>🎯 トリガーで弓、剣を振って攻撃</p>
    <p>👾 全ての敵を倒してクリアを目指そう！</p>
    <button id="startButton">START GAME</button>
  </div>

  <!-- HUD表示 -->
  <div id="hud">
    <div>キル数: <span id="kills">0</span></div>
    <div>被弾数: <span id="hits">0</span></div>
    <div>時間: <span id="timer">0</span>秒</div>
  </div>

  <a-scene background="color: #ff00ff" stats>
    <!-- カメラ・VRリグ -->
    <a-entity id="rig" movement-controls="fly: false; speed: 0.15" player-movement>
      <a-entity camera position="0 1.6 0" look-controls bow-debug>
        <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: [data-raycastable]"></a-entity>
      </a-entity>

      <!-- 左手コントローラー（トリガーで左手にも弓を持てる） -->
      <a-entity id="leftHand" oculus-touch-controls="hand: left" vive-controls="hand: left"
        windows-motion-controls="hand: left" weapon-controller="hand: left"
        raycaster="objects: [data-raycastable]; far: 3">
      </a-entity>

      <!-- 右手コントローラー -->
      <a-entity id="rightHand" oculus-touch-controls="hand: right" vive-controls="hand: right"
        windows-motion-controls="hand: right" weapon-controller="hand: right"
        raycaster="objects: [data-raycastable]; far: 3">
      </a-entity>
    </a-entity>

    <!-- ライティング (サイバーパンク風) -->
    <a-light type="ambient" intensity="0.2"></a-light>
    <a-light type="point" position="5 10 5" intensity="0.5" color="#00d4ff" distance="50"></a-light>
    <a-light type="point" position="-5 10 -5" intensity="0.5" color="#ff00ff" distance="50"></a-light>

    <!-- 地面（無限グリッド風） -->
    <a-gridhelper size="100" divisions="50" colorCenterLine="#00d4ff" colorGrid="#1a1a2e"
      position="0 0 0"></a-gridhelper>
    <a-plane position="0 -0.01 0" rotation="-90 0 0" width="100" height="100" color="#000000"
      material="roughness: 1; metalness: 0"></a-plane>

    <!-- 環境演出：浮遊する幾何学デブリ（particle-systemはaframe-extras controls個別ビルドには含まれないため無効化） -->
    <!-- TODO: 必要であれば aframe-particle-system を別途追加 -->
    <!-- <a-entity position="0 0 0"
      particle-system="preset: dust; particleCount: 500; color: #00d4ff, #ff00ff; size: 0.05; maxAge: 10;"></a-entity> -->

    <!-- 遠景の巨大構造物（雰囲気） -->
    <a-dodecahedron position="-30 20 -40" radius="10" color="#00d4ff"
      material="wireframe: true; transparent: true; opacity: 0.1"
      animation="property: rotation; to: 360 360 0; loop: true; dur: 60000; easing: linear"></a-dodecahedron>
    <a-octahedron position="30 10 -30" radius="8" color="#ff00ff"
      material="wireframe: true; transparent: true; opacity: 0.1"
      animation="property: rotation; to: -360 360 0; loop: true; dur: 50000; easing: linear"></a-octahedron>
  </a-scene>

  <!-- グリッドテクスチャ -->
  <svg id="grid" xmlns="http://www.w3.org/2000/svg" width="100" height="100" style="display: none;">
    <defs>
      <pattern id="grid-pattern" width="10" height="10" patternUnits="userSpaceOnUse">
        <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#00d4ff" stroke-width="0.5" />
      </pattern>
    </defs>
    <rect width="100" height="100" fill="url(#grid-pattern)" />
  </svg>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
